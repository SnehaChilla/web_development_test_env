<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Contact Page</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #06b6d4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      padding: 40px;
      width: 100%;
      max-width: 800px;
    }

    .ai-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
    }

    h1 {
      font-weight: bold;
      color: #0f172a;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 30px;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.2);
      border-color: #2563eb;
    }

    .btn-ai {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 30px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-ai:hover {
      transform: translateY(-2px);
      color: white;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }

    .contact-info {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }

    .contact-info p {
      margin-bottom: 10px;
      color: #475569;
    }

    .contact-info i {
      color: #2563eb;
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <section class="contact-card">
    <div class="ai-icon">
      <i class="fa-solid fa-robot"></i>
    </div>

    <h1 class="text-center">Contact Our AI Team</h1>
    <p class="text-center subtitle">
      Have questions about AI, machine learning, or web development? Send us a message.
    </p>

    <form>
      <div class="row">
        <div class="col-md-6 mb-3">
          <input type="text" class="form-control" placeholder="Your Name" required>
        </div>
        <div class="col-md-6 mb-3">
          <input type="email" class="form-control" placeholder="Your Email" required>
        </div>
      </div>

      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Subject" required>
      </div>

      <div class="mb-3">
        <textarea class="form-control" rows="5" placeholder="Ask your question..." required></textarea>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-ai">
          <i class="fa-solid fa-paper-plane"></i> Send Message
        </button>
      </div>
    </form>

    <div class="contact-info text-center">
      <p><i class="fa-solid fa-envelope"></i> ai.support@example.com</p>
      <p><i class="fa-solid fa-phone"></i> +91 98765 43210</p>
      <p><i class="fa-solid fa-location-dot"></i> Pune, Maharashtra, India</p>
    </div>
  </section>

</body>
</html>
