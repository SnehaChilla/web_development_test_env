<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Contact Page</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Aarav Dev</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>
<!-- Navbar End -->


<!-- Contact Section Start -->
<section class="contact-section py-5">
    <div class="container">

        <!-- Heading -->
        <div class="text-center mb-5 fade-in">
            <h1 class="section-title">Get In Touch</h1>
            <p class="section-subtitle">
                Feel free to contact me for projects, collaborations or just a friendly hello.
            </p>
        </div>

        <div class="row g-4">

            <!-- Contact Form -->
            <div class="col-lg-7 fade-in">
                <div class="glass-card p-4">
                    <h3 class="mb-4">Send Message</h3>

                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" class="form-control custom-input" placeholder="Your Name">
                            </div>

                            <div class="col-md-6">
                                <input type="email" class="form-control custom-input" placeholder="Your Email">
                            </div>

                            <div class="col-12">
                                <input type="text" class="form-control custom-input" placeholder="Subject">
                            </div>

                            <div class="col-12">
                                <textarea rows="6" class="form-control custom-input" placeholder="Your Message"></textarea>
                            </div>

                            <div class="col-12">
                                <button class="btn send-btn w-100">
                                    Send Message <i class="bi bi-send-fill ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Contact Info -->
            <div class="col-lg-5 fade-in">
                <div class="row g-4">

                    <div class="col-md-6 col-lg-12">
                        <div class="info-card">
                            <i class="bi bi-telephone-fill icon"></i>
                            <h5>Phone</h5>
                            <p>+91 98765 43210</p>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-12">
                        <div class="info-card">
                            <i class="bi bi-envelope-fill icon"></i>
                            <h5>Email</h5>
                            <p>hello@aaravdev.com</p>
                        </div>
                    </div>

                    <div class="col-md-12 col-lg-12">
                        <div class="info-card">
                            <i class="bi bi-geo-alt-fill icon"></i>
                            <h5>Location</h5>
                            <p>Pune, Maharashtra, India</p>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</section>
<!-- Contact Section End -->


<!-- Footer Start -->
<footer class="footer text-center py-4">
    <div class="container">
        <div class="social-icons mb-3">
            <a href="#"><i class="bi bi-facebook"></i></a>
            <a href="#"><i class="bi bi-instagram"></i></a>
            <a href="#"><i class="bi bi-linkedin"></i></a>
            <a href="#"><i class="bi bi-github"></i></a>
        </div>

        <p class="mb-0">© 2026 Aarav Dev | All Rights Reserved</p>
    </div>
</footer>
<!-- Footer End -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
