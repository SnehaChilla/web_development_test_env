<!DOCTYPE html>
<html lang="en">

<head>

    
    <title>Contact Page</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background: #f4f7fc;
            font-family: Arial, sans-serif;
        }

        .contact-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 50px 0;
        }

        .contact-box {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .contact-title {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #222;
        }

        .contact-text {
            color: #666;
            margin-bottom: 30px;
        }

        .form-control {
            padding: 12px;
            border-radius: 10px;
        }

        .btn-custom {
            background: #0d6efd;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #084298;
            color: white;
            transform: scale(1.03);
        }

        .contact-info i {
            color: #0d6efd;
            margin-right: 10px;
        }

        @media(max-width:768px) {
            .contact-title {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="row justify-content-center">

                <div class="col-lg-8">
                    <div class="contact-box">

                        <h2 class="contact-title text-center">Contact Us</h2>

                        <p class="contact-text text-center">
                            We'd love to hear from you. Send your message anytime.
                        </p>

                        <!-- Contact Form -->
                        <form>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <input type="text" class="form-control"
                                        placeholder="Your Name">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <input type="email" class="form-control"
                                        placeholder="Your Email">
                                </div>
                            </div>

                            <div class="mb-3">
                                <input type="text" class="form-control"
                                    placeholder="Subject">
                            </div>

                            <div class="mb-3">
                                <textarea class="form-control" rows="5"
                                    placeholder="Your Message"></textarea>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-custom">
                                    Send Message
                                </button>
                            </div>

                        </form>

                        <!-- Contact Info -->
                        <div class="contact-info text-center mt-4">

                            <p>
                                <i class="fa-solid fa-envelope"></i>
                                info@example.com
                            </p>

                            <p>
                                <i class="fa-solid fa-phone"></i>
                                +91 9876543210
                            </p>

                            <p>
                                <i class="fa-solid fa-location-dot"></i>
                                Solapur, Maharashtra, India
                            </p>

                        </div>

                    </div>
                </div>

            </div>
        </div>
    </section>

</body>

</html>
