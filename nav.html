<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Responsive Navbar</title>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 JS CDN (for collapse functionality) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
        }

        /* Navbar Custom Styles */
        .navbar-custom {
            background: linear-gradient(135deg, #3B7597 0%, #2E5F7A 100%);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(59, 117, 151, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 70px;
            padding: 0 1rem;
            position: sticky;
            top: 0;
            z-index: 1030;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: #ffffff !important;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .navbar-brand:hover {
            color: #f8f9fa !important;
            transform: translateY(-2px);
        }

        /* Navigation Links */
        .navbar-nav .nav-link {
            color: #ffffff !important;
            font-weight: 500;
            font-size: 0.95rem;
            margin: 0 8px;
            padding: 8px 16px !important;
            border-radius: 25px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .navbar-nav .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffffff, #e0e7ff);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .navbar-nav .nav-link:hover::before {
            width: 80%;
        }

        .navbar-nav .nav-link:hover {
            color: #f8f9fa !important;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            transform: translateY(-2px);
        }

        /* Active Link */
        .navbar-nav .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff !important;
        }

        .navbar-nav .nav-link.active::before {
            width: 80%;
            background: linear-gradient(90deg, #ffffff, #e0e7ff);
        }

        /* Login Button */
        .btn-login {
            background: rgba(255, 255, 255, 0.15) !important;
            border: 2px solid rgba(255, 255, 255, 0.3) !important;
            color: #ffffff !important;
            font-weight: 600;
            padding: 10px 24px !important;
            border-radius: 30px !important;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            background: rgba(255, 255, 255, 0.25) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
            color: #ffffff !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 117, 151, 0.4);
        }

        /* Hamburger Menu */
        .navbar-toggler {
            border: none;
            padding: 4px 8px;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.8%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        .navbar-toggler:focus {
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.2);
        }

        /* Mobile Menu Styles */
        @media (max-width: 991.98px) {
            .navbar-nav {
                background: rgba(59, 117, 151, 0.95);
                backdrop-filter: blur(20px);
                border-radius: 15px;
                margin-top: 15px;
                padding: 20px;
                box-shadow: 0 10px 40px rgba(59, 117, 151, 0.4);
            }

            .navbar-nav .nav-link {
                margin: 5px 0;
                text-align: center;
                padding: 12px 20px !important;
            }

            .btn-login {
                margin: 10px auto;
                display: block;
                max-width: 200px;
            }
        }

        /* Demo Content */
        .demo-content {
            min-height: calc(100vh - 70px - 90px);
            padding: 100px 20px 40px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        /* Scroll effect for navbar */
        .navbar-scrolled {
            background: rgba(59, 117, 151, 0.95) !important;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(59, 117, 151, 0.4);
        }

        /* Footer */
        footer {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3B7597 0%, #2E5F7A 100%);
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container-fluid">
            <!-- Brand/Logo -->
            <a class="navbar-brand fw-bold" href="#">
                <span style="color: #ffffff;">PORTFOLIO</span>
            </a>

            <!-- Toggler/collapsible Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="nav-link btn-login" href="#">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Demo Content -->
    <div class="demo-content">
        <div class="container">
            <h1 class="text-center mb-5" style="color: #3B7597; font-weight: 700;">Modern Responsive Navbar Demo</h1>
            <p class="text-center lead mb-5">Resize browser to test mobile responsiveness.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-1 fw-semibold">
                &copy; 2026 PORTFOLIO. All Rights Reserved.
            </p>
            <small style="color: rgba(255, 255, 255, 0.85);">
                Designed using HTML, CSS, and Bootstrap 5
            </small>
        </div>
    </footer>

    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar-custom');
            if (window.scrollY > 50) {
                navbar.classList.add('navbar-scrolled');
            } else {
                navbar.classList.remove('navbar-scrolled');
            }
        });

        // Smooth scrolling for nav links (optional)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
            });
        });
    </script>
</body>
</html>
